# Clean install (pnpm) + build + test across Node.js versions.
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs
#
# Actions are pinned to commit SHAs (see .github/workflows/CLAUDE.md).

name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: "*"

permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # pnpm must be set up before setup-node so its cache: 'pnpm' can find the
      # store. Version comes from package.json "packageManager".
      - name: Install pnpm
        # v6.0.7+ self-updates the bootstrap pnpm to the packageManager-pinned
        # version (pnpm@10.x); v6.0.6 ran its bundled pnpm 11, which needs
        # Node >=22.13 and broke the 20.x matrix leg.
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      # nodeLinker: hoisted (pnpm-workspace.yaml) gives a flat node_modules so the
      # VSCode extension-host test runner resolves deps like mocha.
      - run: pnpm install --frozen-lockfile
      # Build the webview SPA bundle (esbuild) so webview breakage is caught here;
      # `pnpm test` then compiles the extension, lints, and runs the suite.
      - run: pnpm run build:spa:prod
      - run: xvfb-run -a pnpm test
